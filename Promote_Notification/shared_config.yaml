# ── Files (path สัมพัทธ์จาก root folder นี้) ─────────────────
files:
  service_map:    "Map_User_Email.xlsx"      # sheet: "map" | Group / Group Mail / Member / Member Mail
  email_template: "Promote_Template_Email.html"  # ไม่ต้องเปลี่ยน ถ้าใช้ template เดิม

# ── Recipient matching ─────────────────────────────────────────
recipient_matching:
  method:           "prefix"
  prefix_min_chars: 10
  case_sensitive:   false

# ── Jira comment ──────────────────────────────────────────────
jira_comment:
  text: "Promote Notification Complete"

# ── Schedule ──────────────────────────────────────────────────
schedule:
  run_time: ""   # เวลาที่รันทุกวัน (HH:MM) เช่น 16:15


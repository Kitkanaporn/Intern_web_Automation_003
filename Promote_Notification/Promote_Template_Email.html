<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promote Email Template</title>
<style>
  body { font-family: Arial, sans-serif; font-size: 13px; color: #000; background: #f0f0f0; margin: 0; padding: 24px; }
  .email-container { max-width: 1000px; margin: 0 auto; background: #fff; border: 1px solid #ccc; }

  .email-meta { background: #ffffff; border-bottom: 1px solid #ddd; padding: 14px 20px; }
  .email-meta-row { display: flex; gap: 10px; margin-bottom: 5px; font-size: 12px; /*border: 1px solid #ffffff*/; padding-bottom: 4px; }
  .email-meta-label { color: #666; min-width: 60px; font-weight: bold; }
  .email-subject-line { font-size: 15px; font-weight: bold; margin-top: 10px; color: #000; /*text-align: center;*/ }

  .email-sent-department { font-size: 12px; color: #666; margin-top: 4px; border: 1px solid #d3d3d3; padding-top: 4px; padding-bottom: 4px; padding-left: 8px; padding-right: 8px; margin-left: 20px; margin-right: 20px; text-align: left; background: rgb(159, 235, 217);}

  .email-body { padding: 24px 28px; line-height: 1.8; }
  .email-body p { margin: 0 0 4px 0; }

  .promote-table { border-collapse: collapse; border: 1px solid #000; width: 100%; font-size: 11px; margin: 12px 0; color: #4783bc; }
  .promote-table th, .promote-table td { border: 1px solid #000; padding: 6px 8px; vertical-align: middle; }
  .promote-table th { background-color: #BDD7EE; color: #1F4E79; text-align: center; }
  .promote-table td.col-task { width: 20%; text-align: center; color: #1F4E79; font-weight: bold; }
  .promote-table td.col-detail { width: 80%; text-align: left; }

  .signature { border-top : 1px solid #666 ; margin-top: 20px; padding-top: 6px; font-size: 12px; color: #333; line-height: 1.7; }

  .placeholder { font-style: italic; font-weight: bold ; font-size: 12px; }
  .header-table {font-weight: bold; font-size: 14px ; text-align: left; color: #000;}

</style>
</head>
<body>

<div class="email-container">
  
  <div class="email-body">

    <p>เรียน &nbsp;&nbsp;&nbsp; ผู้เกี่ยวข้องทุกท่าน</p>
    <p> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ทาง CSD ได้มีการ Promote ระบบ CSD/Subscription Version 
      <span class="placeholder">{{VERSION}}</span> ณ
      <span class="placeholder">{{วัน/วันที่/เดือน/ปี}}</span></p>
    <p>ทั้งนี้รายละเอียดที่ Promote มีดังนี้</p>
    <br>

    <table class="promote-table" style="border-collapse:collapse;border:1px solid #000;width:100%;font-size:11px;margin:12px 0;color:#4783bc;">
      <tbody>
        <tr>
          <th class="col-task" style="border:1px solid #000;padding:6px 8px;vertical-align:middle;background-color:#BDD7EE;color:#1F4E79;text-align:center;width:20%;font-size:14px;font-weight:bold;">CR/IR Task ID</th>
          <th class="col-detail" style="border:1px solid #000;padding:6px 8px;vertical-align:middle;background-color:#BDD7EE;color:#1F4E79;text-align:center;width:80%;font-size:14px;font-weight:bold;">Task Name</th>
        </tr>
        <tr>
          <td class="col-task" style="border:1px solid #000;padding:6px 8px;vertical-align:middle;width:20%;text-align:center;color:#1F4E79;font-weight:bold;"><span class="placeholder">{{Task Workflow ID}}</span></td>
          <td class="col-detail" style="border:1px solid #000;padding:6px 8px;vertical-align:middle;width:80%;text-align:left;"><span class="placeholder">{{รายละเอียดงาน (ชื่อ task)}}</span></td>
        </tr>
      </tbody>
    </table>

    <br>
    <p>ขอบคุณค่ะ</p>
    <p>PTITeam</p>
    <br>

  </div>
</div>

<!--
=== PLACEHOLDER REFERENCE ===

{{SENDER_EMAIL}}         — email ผู้ส่ง
{{SENDER_NAME}}          — ชื่อผู้ส่ง
{{RECIPIENT_EMAIL}}      — email ผู้รับ
{{CC_EMAILS}}            — email สำเนา
{{วัน/วันที่/เดือน/ปี}} — วันที่ Promote เช่น วันศุกร์ที่ 27 มิถุนายน 2568

ต่อแถวใน Promote Table:
{{ตัวย่อแผนก}}           — ตัวย่อชื่อแผนก เช่น CSD
{{Task Workflow ID}}     — รหัส Workflow เช่น WF-12345
{{รายละเอียดงาน (ชื่อ task)}} — ชื่อ task ที่ Promote
-->

</body>
</html>

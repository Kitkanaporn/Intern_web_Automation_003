# =============================================================
#  UAT Notification — Project Config: CSD
#  ข้อมูลเฉพาะ project นี้ — ใช้ร่วมกับ shared_config.yaml
#  ที่อยู่ใน root folder ด้านนอก
# =============================================================

# ── Jira ──────────────────────────────────────────────────────
jira:
  cloud_id:    "" #importance
  base_url:    "" #importance
  project_key: "CSD" #importance

  fields:
    uat_start:        "customfield_10876"   #importance # UAT Start Date
    uat_end:          "customfield_10877"   #importance # UAT End Date
    promote_date:     "customfield_10854"   #importance # Promote Date (Tentative Live Date)
    workflow_task_id: "customfield_10653"   #importance # IT Workflow Task ID
    remark : "customfield_19054"   #importance # Detail of remark
    # หมายเหตุ: ไม่มี notification field — ใช้ Jira comment แทน (ดู shared_config.yaml → jira_comment.text)

  # Service fields → map ไปหา Group ใน Excel อัตโนมัติ
  # ระบบดึง display name จาก Jira API (expand=names) แล้ว match กับคอลัมน์ Group ใน Excel โดยตรง
  service_fields:
    - jira_field:   "customfield_19036"   #importance # Account Services Unit
      table_column: "Account service"

    - jira_field:   "customfield_19037"   #importance # Counter Services Unit
      table_column: "Counter Service"

    - jira_field:   "customfield_19039"   #importance # Issuer Services Unit
      table_column: "Issuer Service"

    - jira_field:   "customfield_19040"   #importance # Investor Services Unit
      table_column: "Investor Service"

    - jira_field:   "customfield_19041"   #importance # CA Service Unit
      table_column: "CA Service"

    - jira_field:   "customfield_19042"   #importance # Distribution Unit
      table_column: "Distribution Service"
  - "CHAYAJAREE@set.or.th"

# ── Files (path สัมพัทธ์จาก root folder นี้) ─────────────────
files:
  service_map:    "Map_User_Email.xlsx"      # sheet: "map" | Group / Group Mail / Member / Member Mail
  email_template: "UAT_Template_Email.html"  # ไม่ต้องเปลี่ยน ถ้าใช้ template เดิม

# ── Recipient matching ─────────────────────────────────────────
recipient_matching:
  method:           "prefix"
  prefix_min_chars: 10
  case_sensitive:   false

# ── Graph API / Power Automate webhook ────────────────────────
# วิธีสร้าง flow: https://make.powerautomate.com → สร้าง → Instant cloud flow
#   Trigger: "เมื่อได้รับคำขอ HTTP" (When an HTTP request is received)
#   Action:  "ส่งอีเมล (V2)" จาก Outlook 365
#   หลัง Save จะได้ HTTP POST URL → วางที่ send_email_webhook ด้านล่าง
graph_api:
  # ── Option A: Power Automate webhook (ง่ายกว่า ไม่ต้องจัดการ token) ──────
  send_email_webhook: ""   # วาง URL ของ Power Automate flow ที่นี่

  # ── Option B: Graph API ตรง (ต้องขอ IT สร้าง Azure App Registration) ──────
  tenant_id:     "5c241f93-f00b-457d-9dd1-1b7b2d034f3e"        # Azure AD Tenant ID
  client_id:     "3cd3c538-abea-4a22-b6b4-9b3ba1ef4c2a"        # Azure App Client ID
  client_secret: "f8fd3ef5-44ac-42c0-a0a4-42554f63dea4"        # Azure App Client Secret
  sender_email:  "Kitkanaporn8125@gmail.com"        # email ที่ส่งในชื่อ เช่น OUTSOURCE2960@set.or.th

  # หมายเหตุ: token จะถูกขอ เฉพาะเมื่อมี ticket ที่ต้องแจ้ง (Phase 3 เท่านั้น)
  #           ขอใหม่ทุกรัน ใช้เสร็จทิ้ง ไม่เก็บข้ามวัน

  # ── Review Mode ───────────────────────────────────────────────
  # AI ส่ง email มาที่นี่ก่อน → ฝ่ายนี้ตรวจสอบแล้ว forward ต่อเอง
  # email ที่ได้รับจะมี To จริง / CC จริง แนบมาด้วย เพื่อสะดวกใน forward
  # Jira comment โพสต์ทันทีหลัง AI ส่ง (ป้องกันส่งซ้ำวันถัดไป)
  # ถ้าว่าง → ส่ง To/CC จริงเลย (production mode)
  draft_recipient: "OUTSOURCE2960@set.or.th"   # เช่น OUTSOURCE2960@set.or.th

# ── Jira comment ──────────────────────────────────────────────
jira_comment:
  text: "UAT Notification Complete"

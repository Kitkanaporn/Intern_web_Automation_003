# ── Email ผู้ส่ง ───────────────────────────────────────────────
email:
  sender_email: ""    #importance #email ของผู้ส่ง (ต้องเป็น email ขององค์กรเท่านั้น) — Claude จะถามและกรอกให้อัตโนมัติ
  sender_name:  ""    #importance #ชื่อของผู้ส่ง
  sender_phone: ""    #importance #เบอร์โทรศัพท์ของผู้ส่ง หรือ องค์กร
  sender_dept:  "Depository & Registrar Systems Dept."
  sender_org:   "The Stock Exchange of Thailand"

  # Email เหล่านี้จะไม่ถูกรวมในรายชื่อผู้รับจริง
  exclude_recipients:
    - ""

  CC_EMAIL: # email ที่จะ CC ทุกครั้ง (ไม่ต้องแก้ไข ถ้าไม่จำเป็น)
